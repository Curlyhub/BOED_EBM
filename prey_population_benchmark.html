<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prey-Population Benchmark — Control States for Sequential BOED</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.js" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#1F2937; --navy:#0F2A44; --navy2:#173757; --blue:#2C5F94;
    --blau:#8B9BB5; --ctrl:#2D5FA8; --cross:#1A3B7D;
    --amber:#F3A000; --amber-soft:#FEF2DA;
    --panel:#F6F8FB; --card:#FFFFFF; --line:#E2E8F0; --line2:#CCD6E2;
    --fill:#EEF2F7; --fill2:#D9E6F2; --muted:#6B7280;
    --font:'Aptos','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    --disp:'Aptos Display','Aptos','Segoe UI',system-ui,sans-serif;
    --mono:'Consolas','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(1200px 500px at 88% -8%, #eaf1fa 0%, rgba(234,241,250,0) 60%),
      linear-gradient(180deg,#FBFCFE 0%, #F4F7FB 100%);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:22px 24px 40px}

  /* Header */
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--blue);font-weight:600}
  h1{font-family:var(--disp);font-weight:700;font-size:26px;line-height:1.15;margin:6px 0 2px;color:var(--navy);
     letter-spacing:-.01em}
  h1 .em{color:var(--cross)}
  .sub{color:var(--muted);font-size:13.5px;margin:0;max-width:640px}
  .authors{font-size:12px;color:var(--muted);margin-top:8px}
  .authors b{color:var(--ink);font-weight:600}

  .chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:360px}
  .chip{font-family:var(--mono);font-size:11px;color:var(--navy2);background:var(--card);
    border:1px solid var(--line2);border-radius:999px;padding:4px 10px;white-space:nowrap}
  .chip b{color:var(--blue)}

  /* Decision-flow ribbon (signature) */
  .flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:18px 0 4px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;
    box-shadow:0 1px 0 rgba(15,42,68,.03)}
  .flow .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-right:12px;font-weight:600}
  .node{display:flex;align-items:center}
  .pill{font-family:var(--mono);font-size:12.5px;color:var(--navy2);background:var(--fill);
    border:1px solid var(--line2);border-radius:8px;padding:5px 9px;font-weight:600}
  .pill.hot{background:var(--amber-soft);border-color:#F0C879;color:#8a5a00}
  .pill.hist{background:#fff}
  .arrow{color:var(--line2);margin:0 7px;font-size:14px}
  .flow .tag{font-size:11px;color:var(--amber);font-weight:700;margin-left:12px;
    font-family:var(--font);letter-spacing:.01em}

  /* Tabs */
  .tabs{display:flex;gap:2px;margin:22px 0 0;border-bottom:1.5px solid var(--line);flex-wrap:wrap}
  .tab{appearance:none;border:0;background:transparent;cursor:pointer;font-family:var(--font);
    font-size:14px;font-weight:600;color:var(--muted);padding:10px 15px 12px;position:relative;
    border-radius:8px 8px 0 0;transition:color .15s,background .15s}
  .tab:hover{color:var(--navy2);background:var(--fill)}
  .tab[aria-selected="true"]{color:var(--navy)}
  .tab[aria-selected="true"]::after{content:"";position:absolute;left:12px;right:12px;bottom:-1.5px;
    height:3px;background:var(--amber);border-radius:3px}
  .tab .n{font-family:var(--mono);font-size:10.5px;color:var(--blau);margin-right:7px}
  .tab[aria-selected="true"] .n{color:var(--blue)}
  :focus-visible{outline:2.5px solid var(--amber);outline-offset:2px;border-radius:6px}

  /* Panels */
  .panel{padding:22px 2px 0;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .grid2{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}
  .grid2b{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:860px){.grid2,.grid2b{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    box-shadow:0 1px 2px rgba(15,42,68,.04)}
  .card h3{font-family:var(--disp);font-size:15px;color:var(--navy);margin:0 0 3px;font-weight:700}
  .card .cap{font-size:12px;color:var(--muted);margin:0 0 14px}
  .lede{font-size:13.5px;line-height:1.55;color:#33404f;margin:0 0 12px}
  .lede b{color:var(--navy2)}

  .eqrow{margin:13px 0;padding:12px 14px;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--blue);border-radius:8px}
  .eqrow .name{font-size:11px;font-family:var(--mono);letter-spacing:.05em;color:var(--blue);
    text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .eqrow.hot{border-left-color:var(--amber);background:linear-gradient(0deg,#fffdf7,#fffdf7)}
  .eqrow.hot .name{color:#a9720a}
  .katex-display{margin:0 !important}
  .katex{font-size:1.02em}

  .deflist{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px;margin:2px 0 4px}
  .deflist dt{font-family:var(--mono);color:var(--cross);font-weight:600;white-space:nowrap}
  .deflist dd{margin:0;color:#3b4757}

  /* Controls */
  .controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:0 0 14px}
  .seg{display:inline-flex;background:var(--fill);border:1px solid var(--line2);border-radius:9px;padding:3px}
  .seg button{appearance:none;border:0;background:transparent;font-family:var(--font);font-weight:600;
    font-size:12.5px;color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .12s}
  .seg button[aria-pressed="true"]{background:var(--card);color:var(--navy);box-shadow:0 1px 2px rgba(15,42,68,.12)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;cursor:pointer;
    color:var(--ink);user-select:none;padding:2px 2px}
  .lg .sw{width:22px;height:10px;border-radius:3px;position:relative;flex:none}
  .lg.off{color:#a9b2bf}
  .lg.off .sw{opacity:.32;filter:grayscale(.6)}
  .lg .role{font-family:var(--mono);font-size:9.5px;color:var(--muted);font-weight:600}

  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 8px;
    box-shadow:0 1px 2px rgba(15,42,68,.04)}
  .chartcard .ct{font-family:var(--disp);font-size:14px;color:var(--navy);font-weight:700;margin:2px 2px 2px}
  .chartcard .cc{font-size:11.5px;color:var(--muted);margin:0 2px 8px}
  svg{display:block;width:100%;height:auto;font-family:var(--font)}
  .ax{stroke:var(--line2);stroke-width:1}
  .grid{stroke:#EDF1F6;stroke-width:1}
  .axlab{fill:var(--muted);font-size:11px}
  .axtitle{fill:var(--navy2);font-size:11.5px;font-weight:600}

  .note{font-size:12px;color:#556170;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;line-height:1.5;margin-top:14px}
  .note b{color:var(--navy2)}
  .note.amber{background:var(--amber-soft);border-color:#F0D9A6}
  .note.amber b{color:#8a5a00}

  .stat{display:flex;gap:18px;flex-wrap:wrap;margin:2px 0 4px}
  .stat .s{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:12px 14px}
  .stat .s .k{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .s .v{font-family:var(--disp);font-size:23px;color:var(--navy);font-weight:700;margin-top:3px;
    display:flex;align-items:baseline;gap:6px}
  .stat .s .v .u{font-size:12px;color:var(--muted);font-weight:600}
  .stat .s.pos .v{color:#1c6b3f}
  .stat .s .ci{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px}

  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  table.tbl th,table.tbl td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
  table.tbl th:first-child,table.tbl td:first-child{text-align:left}
  table.tbl thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    font-weight:700;border-bottom:1.5px solid var(--line2)}
  table.tbl td .mm{font-family:var(--mono);color:var(--muted);font-size:10.5px}
  table.tbl .best{color:var(--cross);font-weight:700}
  table.tbl tr .dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle}

  .foot{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);display:flex;
    justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
  .foot a,.foot code{font-family:var(--mono);color:var(--blue);text-decoration:none}
  .tt{pointer-events:none}
  .play-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:-4px 0 14px;
    background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 13px}
  .pbtn{appearance:none;border:1px solid var(--line2);background:var(--card);cursor:pointer;
    width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--navy);transition:all .12s;flex:none}
  .pbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--fill)}
  .pbtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .pbtn.primary:hover{background:var(--navy);border-color:var(--navy);color:#fff}
  .scrub{flex:1;min-width:150px;max-width:300px;height:4px;accent-color:var(--amber);cursor:pointer}
  .stepread{font-family:var(--mono);font-size:12.5px;color:var(--navy2);font-weight:600;white-space:nowrap}
  .stepread b{color:var(--amber);font-size:14px}
  .tt rect{fill:#0F2A44;opacity:.96}
  .tt text{fill:#fff;font-size:11px}
  .tt .h{fill:#cfe0f2;font-family:var(--mono);font-size:10px}
</style>
</head>

/* ---- KaTeX helper ---- */
function Tex({tex, block}){
  const html = useMemo(()=>{
    try{ return window.katex.renderToString(tex,{displayMode:!!block,throwOnError:false}); }
    catch(e){ return tex; }
  },[tex,block]);
  return <span dangerouslySetInnerHTML={{__html:html}} />;
}

/* ---- stats from per-seed arrays ---- */
function stats(arr){
  const a=arr.filter(x=>x!=null); const n=a.length;
  if(!n) return null;
  const m=a.reduce((s,x)=>s+x,0)/n;
  const v=n>1? a.reduce((s,x)=>s+(x-m)*(x-m),0)/(n-1):0;
  const se=Math.sqrt(v)/Math.sqrt(n);
  return {m,se,lo:m-1.96*se,hi:m+1.96*se,dots:a,n};
}
function pairedDiff(a,b){ // a-b per seed
  const d=a.map((x,i)=>x-b[i]); return stats(d);
}
const EVAL = {
  return:'avg_return', bank_ig:'avg_bank_ig', spce:'avg_spce_lower',
  snmc:'avg_snmc_style_upper', belief:'avg_abs_belief_mean_error'
};
const fmt=(x,d=3)=> x==null?'—':x.toFixed(d);

/* ---- axis helpers ---- */
function niceTicks(min,max,n=5){
  const span=max-min||1; const raw=span/n;
  const mag=Math.pow(10,Math.floor(Math.log10(raw)));
  const norm=raw/mag; let step;
  if(norm<1.5)step=1;else if(norm<3)step=2;else if(norm<7)step=5;else step=10;
  step*=mag;
  const t0=Math.ceil(min/step)*step; const out=[];
  for(let v=t0;v<=max+1e-9;v+=step) out.push(+v.toFixed(6));
  return out;
}

/* =================== LINE + CI TRAJECTORY =================== */
function LineCI({metric, active, showSeeds, maxStep=30}){
  const W=680,H=372,m={l:50,r:16,t:14,b:42};
  const pw=W-m.l-m.r, ph=H-m.t-m.b;
  const steps = DATA.horizon;
  const ms = Math.max(1, Math.min(steps, maxStep));
  const xs = Array.from({length:steps},(_,i)=>i+1);
  const [hx,setHx]=useState(null);

  const series = METHODS.filter(mm=>active[mm.id]).map(mm=>({
    ...mm, ...DATA.traj[mm.id][metric], seeds:DATA.perseed[mm.id][metric]
  }));
  // y-range uses the FULL horizon so the axis never jumps during playback
  let lo=Infinity,hi=-Infinity;
  series.forEach(s=>s.mean.forEach((v,i)=>{const b=1.96*s.se[i];lo=Math.min(lo,v-b);hi=Math.max(hi,v+b);}));
  if(!isFinite(lo)){lo=0;hi=1;}
  const ticks=niceTicks(lo,hi,5);
  const y0=Math.min(lo,ticks[0]), y1=Math.max(hi,ticks[ticks.length-1]);
  const X=t=>m.l+((t-1)/(steps-1))*pw;
  const Y=v=>m.t+ph-((v-y0)/(y1-y0))*ph;

  let hoverIdx = hx==null?null:Math.max(0,Math.min(steps-1,Math.round((hx-m.l)/pw*(steps-1))));
  if(hoverIdx!=null) hoverIdx=Math.min(hoverIdx, ms-1);

  function onMove(e){
    const r=e.currentTarget.getBoundingClientRect();
    setHx((e.clientX-r.left)/r.width*W);
  }
  return (
    <svg viewBox={`0 0 ${W} ${H}`} onMouseMove={onMove} onMouseLeave={()=>setHx(null)}>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line className="grid" x1={m.l} x2={m.l+pw} y1={Y(t)} y2={Y(t)}/>
          <text className="axlab" x={m.l-8} y={Y(t)+3.5} textAnchor="end">{t.toFixed(1)}</text>
        </g>
      ))}
      {[1,5,10,15,20,25,30].map(t=>(
        <text key={t} className="axlab" x={X(t)} y={m.t+ph+16} textAnchor="middle">{t}</text>
      ))}
      <text className="axtitle" x={m.l+pw/2} y={H-6} textAnchor="middle">Experiment step t</text>
      <line className="ax" x1={m.l} x2={m.l} y1={m.t} y2={m.t+ph}/>
      <line className="ax" x1={m.l} x2={m.l+pw} y1={m.t+ph} y2={m.t+ph}/>

      {ms<steps && (
        <line x1={X(ms)} x2={X(ms)} y1={m.t} y2={m.t+ph} stroke="var(--amber)" strokeWidth="1" opacity="0.35" strokeDasharray="2 3"/>
      )}

      {series.map(s=>{
        const up=xs.slice(0,ms).map((t,i)=>`${X(t)},${Y(s.mean[i]+1.96*s.se[i])}`);
        const dn=xs.slice(0,ms).reverse().map((t)=>{const i=t-1;return `${X(t)},${Y(s.mean[i]-1.96*s.se[i])}`;});
        return <polygon key={s.id} points={up.concat(dn).join(' ')} fill={s.hex} opacity={0.13}/>;
      })}
      {showSeeds && series.map(s=>s.seeds.map((sp,k)=>(
        <polyline key={s.id+'_'+k} fill="none" stroke={s.hex} strokeWidth="0.7" opacity="0.22"
          points={sp.slice(0,ms).map((v,i)=>`${X(i+1)},${Y(v)}`).join(' ')}/>
      )))}
      {series.map(s=>(
        <polyline key={s.id} fill="none" stroke={s.hex} strokeWidth={s.id==='ours_ebm_cross'?2.4:1.8}
          points={s.mean.slice(0,ms).map((v,i)=>`${X(i+1)},${Y(v)}`).join(' ')}/>
      ))}
      {series.map(s=>(
        <g key={s.id}>
          <circle cx={X(ms)} cy={Y(s.mean[ms-1])} r="4.5" fill={s.hex} stroke="#fff" strokeWidth="1.4"/>
          <text x={X(ms)-6} y={Y(s.mean[ms-1])-8} textAnchor="end" fontSize="10.5"
            fontFamily="var(--mono)" fontWeight="700" fill={s.hex}>{s.mean[ms-1].toFixed(3)}</text>
        </g>
      ))}

      {hoverIdx!=null && series.length>0 && (()=>{
        const t=hoverIdx+1; const px=X(t);
        const rows=series.map(s=>({c:s.hex,n:s.short,v:s.mean[hoverIdx]}));
        const bw=118, bh=18+rows.length*15;
        const bx=Math.min(px+10, m.l+pw-bw), by=m.t+6;
        return (
          <g className="tt">
            <line x1={px} x2={px} y1={m.t} y2={m.t+ph} stroke="#0F2A44" strokeWidth="1" opacity="0.28" strokeDasharray="3 3"/>
            {series.map(s=><circle key={s.id} cx={px} cy={Y(s.mean[hoverIdx])} r="3" fill={s.hex} stroke="#fff" strokeWidth="1"/>)}
            <rect x={bx} y={by} width={bw} height={bh} rx="7"/>
            <text className="h" x={bx+10} y={by+14}>step t = {t}</text>
            {rows.map((r,i)=>(
              <g key={i}>
                <rect x={bx+10} y={by+22+i*15} width="8" height="8" rx="2" fill={r.c}/>
                <text x={bx+23} y={by+29+i*15}>{r.n}</text>
                <text x={bx+bw-10} y={by+29+i*15} textAnchor="end" fontFamily="var(--mono)">{r.v.toFixed(3)}</text>
              </g>
            ))}
          </g>
        );
      })()}
    </svg>
  );
}

/* =================== GROUPED BAR (final / return / belief) =================== */
function BarCompare({series, unit, dots, baseline0, forceMax}){
  // series: [{id,name,hex,m,lo,hi,dots}]
  const W=680,H=340,m={l:50,r:16,t:16,b:46};
  const pw=W-m.l-m.r, ph=H-m.t-m.b;
  let lo=Math.min(...series.map(s=>s.lo)), hi=Math.max(...series.map(s=>s.hi));
  if(dots) series.forEach(s=>{ if(s.dots){lo=Math.min(lo,...s.dots);hi=Math.max(hi,...s.dots);} });
  const pad=(hi-lo)*0.15||0.2;
  let y0=baseline0?0:lo-pad, y1=(forceMax!=null?forceMax:hi+pad);
  const ticks=niceTicks(y0,y1,5); y0=Math.min(y0,ticks[0]); y1=Math.max(y1,ticks[ticks.length-1]);
  const Y=v=>m.t+ph-((v-y0)/(y1-y0))*ph;
  const n=series.length, bw=Math.min(96, pw/n*0.5);
  const cx=i=>m.l+ (i+0.5)*(pw/n);
  const [hi_,setHi]=useState(null);
  return (
    <svg viewBox={`0 0 ${W} ${H}`}>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line className="grid" x1={m.l} x2={m.l+pw} y1={Y(t)} y2={Y(t)}/>
          <text className="axlab" x={m.l-8} y={Y(t)+3.5} textAnchor="end">{t.toFixed(unit==='%'?0:2)}</text>
        </g>
      ))}
      <line className="ax" x1={m.l} x2={m.l} y1={m.t} y2={m.t+ph}/>
      <line className="ax" x1={m.l} x2={m.l+pw} y1={m.t+ph} y2={m.t+ph}/>
      {series.map((s,i)=>{
        const x=cx(i)-bw/2;
        return (
          <g key={s.id} onMouseEnter={()=>setHi(i)} onMouseLeave={()=>setHi(null)}>
            <rect x={x} y={Y(s.m)} width={bw} height={m.t+ph-Y(s.m)} rx="4"
              fill={s.hex} opacity={hi_===null||hi_===i?0.92:0.5}/>
            {/* CI whisker */}
            <line x1={cx(i)} x2={cx(i)} y1={Y(s.hi)} y2={Y(s.lo)} stroke="#0F2A44" strokeWidth="1.4" opacity="0.7"/>
            <line x1={cx(i)-6} x2={cx(i)+6} y1={Y(s.hi)} y2={Y(s.hi)} stroke="#0F2A44" strokeWidth="1.4" opacity="0.7"/>
            <line x1={cx(i)-6} x2={cx(i)+6} y1={Y(s.lo)} y2={Y(s.lo)} stroke="#0F2A44" strokeWidth="1.4" opacity="0.7"/>
            {dots && s.dots && s.dots.map((d,k)=>(
              <circle key={k} cx={cx(i)+(((k%4)-1.5)*7)} cy={Y(d)} r="2.6" fill="#fff" stroke={s.hex} strokeWidth="1.2" opacity="0.9"/>
            ))}
            <text x={cx(i)} y={Y(s.hi)-9} textAnchor="middle" fontFamily="var(--mono)" fontSize="12"
              fontWeight="700" fill={s.hex}>{s.m.toFixed(unit==='%'?1:3)}{unit==='%'?'%':''}</text>
            <text x={cx(i)} y={m.t+ph+18} textAnchor="middle" fontSize="12" fontWeight="600"
              fill="var(--navy2)">{s.name}</text>
            <text x={cx(i)} y={m.t+ph+32} textAnchor="middle" fontSize="10" fontFamily="var(--mono)"
              fill="var(--muted)">{s.role}</text>
          </g>
        );
      })}
    </svg>
  );
}

  const x0=Math.min(xlo-0.05,xt[0]),x1=Math.max(xhi+0.05,xt[xt.length-1]);
  const y0=Math.min(ylo-0.05,yt[0]),y1=Math.max(yhi+0.05,yt[yt.length-1]);
  const X=v=>m.l+((v-x0)/(x1-x0))*pw, Y=v=>m.t+ph-((v-y0)/(y1-y0))*ph;
  return (
    <svg viewBox={`0 0 ${W} ${H}`}>
      {xt.map((t,i)=><g key={'x'+i}><line className="grid" x1={X(t)} x2={X(t)} y1={m.t} y2={m.t+ph}/>
        <text className="axlab" x={X(t)} y={m.t+ph+16} textAnchor="middle">{t.toFixed(2)}</text></g>)}
      {yt.map((t,i)=><g key={'y'+i}><line className="grid" x1={m.l} x2={m.l+pw} y1={Y(t)} y2={Y(t)}/>
        <text className="axlab" x={m.l-8} y={Y(t)+3.5} textAnchor="end">{t.toFixed(2)}</text></g>)}
      <line className="ax" x1={m.l} x2={m.l} y1={m.t} y2={m.t+ph}/>
      <line className="ax" x1={m.l} x2={m.l+pw} y1={m.t+ph} y2={m.t+ph}/>
      <text className="axtitle" x={m.l+pw/2} y={H-6} textAnchor="middle">Average evaluation return</text>
      <text className="axtitle" transform={`translate(13,${m.t+ph/2}) rotate(-90)`} textAnchor="middle">SPCE lower bound</text>
      {pts.map(p=>(
        <g key={p.id}>
          <line x1={X(p.x.lo)} x2={X(p.x.hi)} y1={Y(p.y.m)} y2={Y(p.y.m)} stroke={p.hex} strokeWidth="1.3" opacity="0.5"/>
          <line x1={X(p.x.m)} x2={X(p.x.m)} y1={Y(p.y.lo)} y2={Y(p.y.hi)} stroke={p.hex} strokeWidth="1.3" opacity="0.5"/>
          <circle cx={X(p.x.m)} cy={Y(p.y.m)} r={p.id==='ours_ebm_cross'?7:5.5} fill={p.hex} stroke="#fff" strokeWidth="1.6"/>
          <text x={X(p.x.m)+10} y={Y(p.y.m)-8} fontSize="11.5" fontWeight="700" fill={p.hex}>{p.name}</text>
        </g>
      ))}
    </svg>
  );
}

/* =================== TRAINING CURVE =================== */
function TrainCurve(){
  const W=680,H=300,m={l:52,r:16,t:14,b:42};
  const pw=W-m.l-m.r, ph=H-m.t-m.b;
  const S=METHODS.map(mm=>({...mm, ...DATA.train[mm.id]}));
  const maxEp=Math.max(...S.map(s=>s.ep[s.ep.length-1]));
  let lo=Infinity,hi=-Infinity; S.forEach(s=>s.ret.forEach(v=>{lo=Math.min(lo,v);hi=Math.max(hi,v);}));
  const yt=niceTicks(lo,hi,4);
  const y0=Math.min(lo,yt[0]),y1=Math.max(hi,yt[yt.length-1]);
  const X=e=>m.l+(e/maxEp)*pw, Y=v=>m.t+ph-((v-y0)/(y1-y0))*ph;
  return (
    <svg viewBox={`0 0 ${W} ${H}`}>
      {yt.map((t,i)=><g key={i}><line className="grid" x1={m.l} x2={m.l+pw} y1={Y(t)} y2={Y(t)}/>
        <text className="axlab" x={m.l-8} y={Y(t)+3.5} textAnchor="end">{t.toFixed(1)}</text></g>)}
      {[0,750,1500,2250,3000].map(e=><text key={e} className="axlab" x={X(e)} y={m.t+ph+16} textAnchor="middle">{e}</text>)}
      <text className="axtitle" x={m.l+pw/2} y={H-6} textAnchor="middle">Training episode</text>
      <line className="ax" x1={m.l} x2={m.l} y1={m.t} y2={m.t+ph}/>
      <line className="ax" x1={m.l} x2={m.l+pw} y1={m.t+ph} y2={m.t+ph}/>
      {S.map(s=>(
        <polyline key={s.id} fill="none" stroke={s.hex} strokeWidth={s.id==='ours_ebm_cross'?2:1.5}
          opacity="0.95" points={s.ep.map((e,i)=>`${X(e)},${Y(s.ret[i])}`).join(' ')}/>
      ))}
    </svg>
  );
}

/* =================== TABS CONTENT =================== */
function ModelTab(){
  return (
    <div className="panel">
      <div className="grid2">
        <div className="card">
          <h3>The prey-population task</h3>
          <p className="cap">Blau et al. (2022) benchmark · nonlinear functional response</p>
          <p className="lede">A predator consumes prey over 24&nbsp;h under a Holling type-II response. The design is the
          <b> initial prey count</b> <Tex tex="d=N_0\in\{1,\dots,300\}"/>; the observation is the number consumed.
          The goal is to infer the attack rate <Tex tex="a"/> and handling time <Tex tex="T_h"/>, working in log-coordinates.</p>
          <dl className="deflist">
            <dt>θ</dt><dd><Tex tex="(\log a,\ \log T_h)"/>, prior <Tex tex="\mathcal N(-1.4,\,1.35^2)"/> per coordinate</dd>
            <dt>d</dt><dd>initial population <Tex tex="N_0"/>, discrete in <Tex tex="\{1,\dots,300\}"/></dd>
            <dt>τ*</dt><dd>observation time, 24&nbsp;h</dd>
            <dt>T</dt><dd>horizon of 30 sequential experiments</dd>
          </dl>
          <div className="eqrow">
            <div className="name">Holling-II dynamics</div>
            <Tex block tex="\frac{dN(\tau)}{d\tau}=-\frac{a\,N(\tau)^2}{1+a\,T_h\,N(\tau)^2},\qquad N(0)=d"/>
          </div>
          <div className="eqrow">
            <div className="name">Consumed fraction &amp; observation</div>
            <Tex block tex="p_{\tau^\star}(\theta,d)=\frac{d-N_{\tau^\star}(\theta,d)}{d},\qquad Y\mid\theta,d\sim\mathrm{Binomial}\!\big(d,\,p_{\tau^\star}(\theta,d)\big)"/>
          </div>
        </div>

        <div className="card">
          <h3>Filtering &amp; the control state</h3>
          <p className="cap">Exact likelihood filter → energy-tilted representation</p>
          <p className="lede">Posterior updating depends on the history only through the <b>accumulated likelihood</b>, so
          the belief is carried exactly on a finite bank of atoms. The policy does not act on the raw history but on a
          derived control state <Tex tex="s_t=(t,\xi_t,\pi_t)"/>.</p>
          <div className="eqrow">
            <div className="name">Accumulated likelihood &amp; posterior</div>
            <Tex block tex="L_t(\theta;h_t)=\prod_{k=0}^{t}\mathrm{Binomial}\!\big(y_k;d_k,p_{\tau^\star}(\theta,d_k)\big),\quad \pi_t(d\theta)\propto L_t(\theta;h_t)\,\pi_0(d\theta)"/>
          </div>
          <div className="eqrow">
            <div className="name">Finite-bank belief</div>
            <Tex block tex="\pi_t\approx\textstyle\sum_{i=1}^{M} w_i^{(t)}\,\delta_{\theta_i},\qquad M=512"/>
          </div>
          <div className="eqrow hot">
            <div className="name">EBM tilt — reweighting the bank</div>
            <Tex block tex="\bar w_i^{(t,\phi)}=\frac{w_i^{(t)}\exp\{-E_\phi(\theta_i,s_t)\}}{\sum_{j} w_j^{(t)}\exp\{-E_\phi(\theta_j,s_t)\}}"/>
          </div>
          <div className="eqrow hot">
            <div className="name">Cross-EBM — candidate ⊙ state interaction</div>
            <Tex block tex="E^{\mathrm{cross}}_\rho(\theta_i,s_t,c_t)=e_\rho\!\big(\phi_\theta(\theta_i),\,\phi_s(s_t),\,\phi_\theta(\theta_i)\odot\phi_s(s_t),\,C_\rho(\theta_i,s_t,c_t)\big)"/>
          </div>
        </div>
      </div>
      <div className="note"><b>Same Bayesian core, different interface.</b> The likelihood, prior and filter are identical
      across all three methods — only the <b>policy-facing representation</b> changes: Blau reads the raw/amortized history,
      EBM-control reads a state-level energy tilt, and EBM-cross evaluates each candidate hypothesis relative to the current
      posterior geometry before belief summaries are formed.</div>
    </div>
  );
}

const IG = [
  {id:'spce', label:'SPCE lower', full:'SPCE contrastive lower bound', L:'L = 1024'},
  {id:'bank_ig', label:'Bank IG', full:'Finite-bank information gain', L:'H(w⁰)−H(wᵗ)'},
  {id:'snmc', label:'SNMC upper', full:'SNMC-style upper estimate', L:'L = 512'},
];
function InfoTab(){
  const [metric,setMetric]=useState('spce');
  const [view,setView]=useState('traj');
  const [seeds,setSeeds]=useState(false);
  const [active,setActive]=useState({blau_approx:true,ours_ebm_control:true,ours_ebm_cross:true});
  const [animate,setAnimate]=useState(false);
  const [step,setStep]=useState(30);
  const [playing,setPlaying]=useState(false);
  const meta=IG.find(x=>x.id===metric);
  const finalSeries=METHODS.map(m=>{const s=stats(DATA.eval[m.id][EVAL[metric]]);return {...m,...s};});

  // playback loop: advance one experiment step at a time, stop at t=30
  useEffect(()=>{
    if(!playing) return;
    const id=setInterval(()=>{
      setStep(s=>{ if(s>=DATA.horizon){setPlaying(false);return DATA.horizon;} return s+1; });
    },150);
    return ()=>clearInterval(id);
  },[playing]);

  function toStatic(){ setAnimate(false); setPlaying(false); setStep(DATA.horizon); }
  function toAnimate(){ setAnimate(true); setPlaying(false); setStep(1); }
  function play(){ if(step>=DATA.horizon) setStep(1); setPlaying(true); }
  function pause(){ setPlaying(false); }
  function reset(){ setPlaying(false); setStep(1); }
  const maxStep = animate ? step : DATA.horizon;

  return (
    <div className="panel">
      <div className="controls">
        <div className="seg">{IG.map(x=>(
          <button key={x.id} aria-pressed={metric===x.id} onClick={()=>setMetric(x.id)}>{x.label}</button>
        ))}</div>
        <div className="seg">
          <button aria-pressed={view==='traj'} onClick={()=>setView('traj')}>Over steps</button>
          <button aria-pressed={view==='final'} onClick={()=>{setView('final');setPlaying(false);}}>Final step</button>
        </div>
        {view==='traj' && <div className="seg">
          <button aria-pressed={!seeds} onClick={()=>setSeeds(false)}>Mean ± CI</button>
          <button aria-pressed={seeds} onClick={()=>setSeeds(true)}>Per-seed</button></div>}
        {view==='traj' && <div className="seg">
          <button aria-pressed={!animate} onClick={toStatic}>Static</button>
          <button aria-pressed={animate} onClick={toAnimate}>Animate</button></div>}
        <Legend active={active} setActive={setActive}/>
      </div>

      {view==='traj' && animate && (
        <div className="play-bar">
          {playing
            ? <button className="pbtn primary" aria-label="Pause" onClick={pause}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="1.5" width="3" height="9" rx="1"/><rect x="7" y="1.5" width="3" height="9" rx="1"/></svg>
              </button>
            : <button className="pbtn primary" aria-label={step>=DATA.horizon?'Replay':'Play'} onClick={play}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2.5 1.3l7.5 4.7-7.5 4.7z"/></svg>
              </button>}
          <button className="pbtn" aria-label="Reset to start" onClick={reset}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M11.5 7a4.5 4.5 0 1 1-1.3-3.2"/><path d="M10.6 1.4V4h-2.6"/></svg>
          </button>
          <input className="scrub" type="range" min="1" max={DATA.horizon} value={step}
            onChange={e=>{setPlaying(false);setStep(+e.target.value);}} aria-label="Experiment step"/>
          <span className="stepread">t = <b>{step}</b> / {DATA.horizon}</span>
        </div>
      )}

      <div className="chartcard">
        <div className="ct">{meta.full} <span style={{color:'var(--muted)',fontWeight:600,fontSize:12}}>· {meta.L}</span></div>
        <div className="cc">{view==='traj'
          ? (animate
              ? 'Playback — belief accumulates one experiment at a time from t = 1 to t = 30 · band = mean ± 1.96·SE over 8 seeds'
              : 'Cumulative estimate across the 30-step sequence · band = mean ± 1.96·SE over 8 seeds · marker = final value')
          : 'Final-step estimate · bar = mean · whisker = 95% CI · dots = per-seed'}</div>
        {view==='traj'
          ? <LineCI metric={metric} active={active} showSeeds={seeds} maxStep={maxStep}/>
          : <BarCompare series={finalSeries} dots={true}/>}
      </div>
      <div className="note">
        {metric==='spce' && <span><b>SPCE lower bound.</b> Both EBM variants dominate Blau throughout the horizon;
        EBM-cross reaches the highest final estimate ({DATA.traj.ours_ebm_cross.spce.mean[29].toFixed(3)} nats vs {DATA.traj.blau_approx.spce.mean[29].toFixed(3)} for Blau).
        This is an independent information-gain diagnostic, not the training objective.</span>}
        {metric==='bank_ig' && <span><b>Finite-bank information gain</b> measures posterior concentration on the exact
        filter. EBM-control gives the largest bank-IG; the derived states concentrate belief faster than the raw-history baseline.</span>}
        {metric==='snmc' && <span><b>SNMC-style upper estimate.</b> A higher-variance secondary diagnostic (used only as a
        sanity bound). The ordering agrees with SPCE, but the wide intervals are why SPCE and bank-IG carry the main comparison.</span>}
      </div>
    </div>
  );
}

function BeliefTab(){
  const ebm=METHODS.filter(m=>m.id!=='blau_approx');
  const series=ebm.map(m=>{const s=stats(DATA.eval[m.id][EVAL.belief]);return {...m,...s};});
  return (
    <div className="panel">
      <div className="grid2">

          <div className="ct">Belief mean error <span style={{color:'var(--muted)',fontWeight:600,fontSize:12}}>· lower is better</span></div>
          <div className="cc">‖ EBM-induced belief mean − exact filtered mean ‖ · bar = mean · dots = per-seed (8)</div>
          <BarCompare series={series} dots={true} baseline0={true}/>
        </div>
        <div className="card">
          <h3>Why the cross energy wins on fidelity</h3>
          <p className="lede">The belief-mean error is defined only for the EBM variants, since it measures the fidelity
          of the <b>induced belief</b> against the exact finite-bank posterior. Blau has no induced surrogate.</p>
          <p className="lede"><b>EBM-cross</b> attains the lowest error
          (<Tex tex="0.603"/> vs <Tex tex="0.693"/> for EBM-control), because it evaluates each candidate hypothesis
          <em> conditionally on the current posterior geometry</em> before summaries are computed.</p>
          <div className="eqrow">
            <div className="name">Bimodal collapse</div>
            <Tex block tex="\pi_t \xrightarrow{\ T=30\ } \text{two atoms near the true }\theta"/>
          </div>
          <p className="lede" style={{marginBottom:0}}>Moment features <Tex tex="(\mu_t,\Sigma_t)"/> are a lossy summary
          when <Tex tex="\pi_t"/> is bimodal — the cross representation recovers structure the mean misses.</p>
        </div>
      </div>
      <div className="note"><b>Read alongside return.</b> Lower belief error tracks the return and SPCE gains:
      the cross energy is not a reward-shaping trick but a cleaner reorganization of posterior structure.</div>
    </div>
  );
}

        <span className="node"><span className="pill">π<sub>t</sub></span></span>

        <span className="node"><span className="pill">s<sub>t</sub>=(t, ξ<sub>t</sub>, π<sub>t</sub>)</span></span>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
